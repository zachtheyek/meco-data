name: Auto-refresh from MECo upstream

# Weekly: if the upstream Malaysian Election Corpus (Thevesh/paper-meco-results) has new
# data, fetch it, rebuild out/, and commit+push automatically. If nothing changed, do
# nothing. The downstream sites (lompat, undi-wrapped) then rebuild from the new out/ on
# their own weekly schedule a few minutes later.
on:
  schedule:
    - cron: "7 20 * * 0"   # Sundays 20:07 UTC, before the downstream deploys
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Is upstream newer than our snapshot?
        id: chk
        run: |
          UP=$(curl -fsS https://api.github.com/repos/Thevesh/paper-meco-results/commits/main \
               | python3 -c "import sys,json;print(json.load(sys.stdin)['sha'])")
          HAVE=$(tr -d '[:space:]' < .meco-snapshot 2>/dev/null || echo "")
          echo "upstream=$UP  snapshot=$HAVE"
          if [ "$UP" = "$HAVE" ]; then echo "changed=false" >> "$GITHUB_OUTPUT"; else echo "changed=true" >> "$GITHUB_OUTPUT"; fi
          echo "up=$UP" >> "$GITHUB_OUTPUT"
      - name: Fetch + rebuild
        if: steps.chk.outputs.changed == 'true'
        run: |
          pip install pandas pyarrow
          python fetch_raw.py        # downloads upstream CSVs into raw/, writes .meco-snapshot
          python pipeline.py         # rebuilds out/*.parquet (fails loudly on broken data)
          python validate.py || true # sanity-check log (non-blocking)
      - name: Commit & push
        if: steps.chk.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add raw out .meco-snapshot
          git commit -m "Auto-refresh MECo data (upstream ${{ steps.chk.outputs.up }})" \
            && git push || echo "nothing to commit"
