name: Auto-refresh from MECo upstream

# Weekly, fully hands-off: pull the latest results from the upstream corpus AND re-fetch the
# seat lineage if (and only if) a redelineation changed the seat set. If any committed data
# actually changed, rebuild out/ and commit+push. The downstream sites (lompat, undi-wrapped)
# then rebuild from the new out/ on their own weekly schedule minutes later.
#
# The electiondata.my API key lives in the EDMY_API_KEY repo secret (never in the repo). It's
# used only for the cheap weekly seat-set check; the 822-call lineage fetch runs only when the
# seat set changes (~once a decade). Without the secret, lineage is simply left as-is.
on:
  schedule:
    - cron: "7 20 * * 0"   # Sundays 20:07 UTC, before the downstream deploys
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Refresh data, rebuild + push if anything changed
        env:
          EDMY_API_KEY: ${{ secrets.EDMY_API_KEY }}
        run: |
          pip install pandas pyarrow
          python fetch_lineage.py        # re-fetches lineage only if the seat set changed (redelineation)
          python fetch_raw.py            # pulls the latest upstream result CSVs + records .meco-snapshot
          if git diff --quiet -- raw; then
            echo "No data change — nothing to do."; exit 0
          fi
          python pipeline.py             # rebuilds out/*.parquet (fails loudly on broken data)
          python validate.py || true     # sanity-check log (non-blocking)
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add raw out .meco-snapshot
          git commit -m "Auto-refresh MECo data" && git push
